version: 2
updates:
  # Server + web npm deps. Workspaces are listed separately so PRs are scoped
  # by package and easier to review.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [patch, minor]
      development:
        dependency-type: development
        update-types: [patch, minor]
    # Major bumps land as individual PRs so they can be evaluated for
    # breaking changes one at a time.
    labels: [dependencies]

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [patch, minor]
      development:
        dependency-type: development
        update-types: [patch, minor]
    labels: [dependencies, server]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [patch, minor]
      development:
        dependency-type: development
        update-types: [patch, minor]
    labels: [dependencies, web]

  # GitHub Actions versions in the workflow files.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Los_Angeles"
    labels: [dependencies, ci]

  # Base image (node:24-bookworm-slim) updates in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Los_Angeles"
    labels: [dependencies, docker]
